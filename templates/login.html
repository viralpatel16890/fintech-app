<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FinanceTrack</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
  <div class="card shadow" style="width: 100%; max-width: 380px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-wallet2 fs-1 text-primary"></i>
        <h4 class="fw-bold mt-2 mb-0">FinanceTrack</h4>
        <small class="text-muted">Sign in to continue</small>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-medium">Username</label>
          <input type="text" name="username" class="form-control" autofocus autocomplete="username" required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Password</label>
          <input type="password" name="password" class="form-control" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
        </button>
      </form>
    </div>
  </div>
</body>
</html>
