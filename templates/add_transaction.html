{% extends "base.html" %}
{% block title %}Add Transaction — FinanceTrack{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 col-md-8">
    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="/transactions" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <div>
        <h4 class="fw-bold mb-0">Add Transaction</h4>
        <small class="text-muted">Record a new income or expense</small>
      </div>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="post" id="txnForm">

          <!-- Type Toggle -->
          <div class="mb-4">
            <label class="form-label fw-medium">Transaction Type</label>
            <div class="type-toggle d-flex gap-2">
              <input type="radio" class="btn-check" name="type" id="typeExpense" value="expense" checked>
              <label class="btn btn-outline-danger flex-fill" for="typeExpense">
                <i class="bi bi-arrow-up-circle me-2"></i>Expense
              </label>
              <input type="radio" class="btn-check" name="type" id="typeIncome" value="income">
              <label class="btn btn-outline-success flex-fill" for="typeIncome">
                <i class="bi bi-arrow-down-circle me-2"></i>Income
              </label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Date</label>
            <input type="date" name="date" class="form-control" value="{{ today }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Description</label>
            <input type="text" name="description" class="form-control"
                   placeholder="e.g. Monthly Salary, Grocery Shopping..." required maxlength="100">
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Amount ($)</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input type="number" name="amount" class="form-control"
                     placeholder="0.00" step="0.01" min="0.01" required>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium">Category</label>
            <select name="category" id="categorySelect" class="form-select" required>
              <option value="" disabled selected>Select a category</option>
              <optgroup label="Expense Categories" id="expenseCats">
                {% for cat in categories['expense'] %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
              </optgroup>
              <optgroup label="Income Categories" id="incomeCats" style="display:none">
                {% for cat in categories['income'] %}
                <option value="{{ cat }}">{{ cat }}</option>
                {% endfor %}
              </optgroup>
            </select>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-add-txn flex-fill">
              <i class="bi bi-check-lg me-2"></i>Save Transaction
            </button>
            <a href="/transactions" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const expenseCats = document.getElementById('expenseCats');
const incomeCats = document.getElementById('incomeCats');
const categorySelect = document.getElementById('categorySelect');

function updateCategories(type) {
  categorySelect.value = '';
  if (type === 'income') {
    expenseCats.style.display = 'none';
    incomeCats.style.display = '';
  } else {
    expenseCats.style.display = '';
    incomeCats.style.display = 'none';
  }
}

document.querySelectorAll('input[name="type"]').forEach(radio => {
  radio.addEventListener('change', e => updateCategories(e.target.value));
});
</script>
{% endblock %}
